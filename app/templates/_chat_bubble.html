<div class="msg-row user">
  <div class="bubble user">{{ user_message }}</div>
</div>
<div class="msg-row claude">
  <div class="bubble claude">{{ claude_message }}</div>
</div>

{% if plan_confirmed %}
<div class="msg-row claude">
  <div class="bubble claude" style="padding:1em 1.1em">
    <p style="margin-bottom:0.75em;color:var(--muted);font-size:0.9em">Ready to generate your personalised training plan. This will take about 30 seconds.</p>
    <form hx-post="/setup/generate"
          hx-target="#chat-window"
          hx-swap="beforeend"
          hx-on::before-request="showGenerationOverlay()"
          hx-on::after-request="hideGenerationOverlay()">
      <div class="gen-btn-row">
        <button type="submit" class="btn-primary">Generate my training plan →</button>
      </div>
    </form>
  </div>
</div>
{% endif %}
