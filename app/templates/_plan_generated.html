{% if error %}
<div class="msg-row claude">
  <div class="bubble claude">
    <p style="color:#f87171;margin-bottom:0.5em">Plan generation failed: {{ error }}</p>
    <p style="color:var(--muted);font-size:0.88em">You can try again by refreshing the page, or <a href="/setup/reset">start a new conversation</a>.</p>
  </div>
</div>
{% else %}
<div class="msg-row claude">
  <div class="bubble claude" style="padding:1.1em 1.25em">
    <p style="margin-bottom:0.75em">Your 4-week training plan is ready.</p>
    <div style="display:flex;gap:0.6em;flex-wrap:wrap">
      <a href="/calendar" class="btn btn-primary">View calendar →</a>
      <a href="/setup/refine" class="btn">Refine the plan</a>
    </div>
  </div>
</div>
{% endif %}
