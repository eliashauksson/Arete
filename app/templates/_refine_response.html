<div class="msg-row user">
  <div class="bubble user">{{ instruction }}</div>
</div>
{% if error %}
<div class="msg-row claude">
  <div class="bubble claude">
    <span style="color:#f87171;"><strong>Error:</strong> {{ error }}</span>
  </div>
</div>
{% else %}
<div class="msg-row claude">
  <div class="bubble claude">Plan updated.</div>
</div>
{% endif %}

<div id="plan-view" hx-swap-oob="true">
  {% include "_plan_table.html" %}
</div>
