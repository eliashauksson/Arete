<div class="msg-row user">
  <div class="bubble user">{{ user_message }}</div>
</div>
<div class="msg-row claude">
  <div class="bubble claude">{{ claude_message }}</div>
</div>

{% if plan_confirmed %}
<div class="msg-row claude">
  <div class="bubble claude" style="padding:1.1em 1.25em;">
    <p style="margin-bottom:12px;color:var(--muted);font-size:13px;">Ready to generate your personalised training plan. This usually takes about 30 seconds.</p>
    <form hx-post="/setup/generate"
          hx-target="#chat-window"
          hx-swap="beforeend"
          hx-on::before-request="showGenerationOverlay()"
          hx-on::after-request="hideGenerationOverlay()">
      <button type="submit" class="gen-cta-btn">&#10022; Generate my training plan &rarr;</button>
    </form>
  </div>
</div>
{% endif %}
